    <section id="about" class="about" aria-label="About section">

        <!-- Background decorations -->
        <div class="about__bg-grid" aria-hidden="true"></div>
        <div class="about__glow about__glow--left"  aria-hidden="true"></div>
        <div class="about__glow about__glow--right" aria-hidden="true"></div>

        <div class="about__inner">

        <!-- ── Section header ── -->
        <div class="about__header">
          <span class="section__tag">// skills</span>
          <h2 class="section__title">Habilidades
            <span class="section__title-accent"></span>
          </h2>
        </div>

         <div class="about__top">

         </div>

             <div class="about__stack">

      <div class="about__stack-header">
        <h3 class="about__stack-title">
          <span class="bracket" aria-hidden="true">&lt;</span>
          Tech Stack
          <span class="bracket" aria-hidden="true">/&gt;</span>
        </h3>

        <!-- Filter tabs -->
        <div class="about__filters" role="tablist" aria-label="Filtrar tecnologías">
          <button
            *ngFor="let tab of filterTabs"
            class="filter-tab"
            [class.filter-tab--active]="activeFilter === tab"
            (click)="setFilter(tab)"
            role="tab"
            [attr.aria-selected]="activeFilter === tab"
          >
            {{ tab }}
          </button>
        </div>
      </div>

      <!-- Tech cards grid -->
      <div class="tech-grid" role="list">
        <div
          class="tech-card glass-card"
          *ngFor="let tech of filteredStack"
          role="listitem"
          [style.--tech-color]="tech.color"
        >
          <!-- Category badge -->
          <span class="tech-card__category">{{ tech.category }}</span>

          <!-- Name -->
          <span class="tech-card__name">{{ tech.name }}</span>

          <!-- Level dots -->
          <div class="tech-card__level" [attr.aria-label]="'Nivel ' + tech.level + ' de 5'">
            <span
              *ngFor="let dot of levelArray(tech.level); let i = index"
              class="level-dot"
              [class.level-dot--filled]="i < tech.level"
            ></span>
          </div>
        </div>
      </div>

    </div>

        </div>


    </section>
