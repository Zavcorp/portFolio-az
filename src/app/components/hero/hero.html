<!-- ─────────────────────────────────────────────────────
     HERO — Adrian Zavaleta Portfolio
     Glitch/cyberpunk · dark · teal accent
     ──────────────────────────────────────────────────── -->

<section id="home" class="hero" aria-label="Hero section">

  <!-- Particle / grid background -->
  <div class="hero__grid" aria-hidden="true"></div>

  <!-- Ambient glows -->
  <div class="hero__glow hero__glow--teal"  aria-hidden="true"></div>
  <div class="hero__glow hero__glow--purple" aria-hidden="true"></div>

  <!-- Scanlines overlay -->
  <div class="hero__scanlines" aria-hidden="true"></div>

  <!-- ── Main content ── -->
  <div class="hero__inner">

    <!-- LEFT: text content -->
    <div class="hero__content">

      <!-- Status badge -->
      <div class="hero__badge" [attr.aria-label]="t().hero_available">
        <span class="hero__badge-dot" aria-hidden="true"></span>
        {{ t().hero_available }}
      </div>

      <!-- Name -->
      <h1 class="hero__name">
        <span class="hero__name-line hero__name-line--1">Adrian</span>
        <span class="hero__name-line hero__name-line--2">Zavaleta</span>
      </h1>

      <!-- Glitch title -->
      <div class="hero__title-wrapper" aria-label="Frontend Developer">
        <span class="hero__title-bracket" aria-hidden="true">&lt;</span>
        <span class="hero__title" aria-live="polite">{{ displayedTitle }}</span>
        <span class="hero__title-cursor" aria-hidden="true">_</span>
        <span class="hero__title-bracket" aria-hidden="true">/&gt;</span>
      </div>

      <!-- Tagline -->
      <p class="hero__tagline">{{ t().hero_tagline }}</p>

      <!-- CTA buttons -->
      <div class="hero__actions">
        <button
          class="hero__btn hero__btn--primary"
          (click)="scrollToProjects()"
          [attr.aria-label]="t().hero_btn_projects"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
          </svg>
          {{ t().hero_btn_projects }}
        </button>

        <button
          class="hero__btn hero__btn--secondary"
          (click)="exportResumePDF()"
          [attr.aria-label]="t().hero_btn_cv"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          {{ t().hero_btn_cv }}
        </button>
      </div>

      <!-- Social links -->
      <div class="hero__socials">
        <span class="hero__socials-label">{{ t().hero_find_me }}</span>

        <a
          [href]="githubUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="hero__social-link"
          aria-label="GitHub de Adrian Zavaleta"
        >
          <!-- GitHub icon -->
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
          </svg>
          GitHub
        </a>

        <span class="hero__socials-divider" aria-hidden="true">/</span>

        <a
          [href]="linkedinUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="hero__social-link"
          aria-label="LinkedIn de Adrian Zavaleta"
        >
          <!-- LinkedIn icon -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
          LinkedIn
        </a>
      </div>

    </div>

    <!-- RIGHT: profile image -->
    <div class="hero__visual">

      <!-- Decorative hex frame -->
      <div class="hero__frame" aria-hidden="true">
        <div class="hero__frame-ring hero__frame-ring--outer"></div>
        <div class="hero__frame-ring hero__frame-ring--inner"></div>

        <!-- Corner brackets -->
        <span class="hero__corner hero__corner--tl"></span>
        <span class="hero__corner hero__corner--tr"></span>
        <span class="hero__corner hero__corner--bl"></span>
        <span class="hero__corner hero__corner--br"></span>

        <!-- Profile image -->
        <div class="hero__photo-wrapper">
          <img
            [src]="profileImg"
            [alt]="'Foto de perfil de ' + name"
            class="hero__photo"
            loading="eager"
          />
          <!-- Glitch overlay on hover -->
          <div class="hero__photo-glitch" aria-hidden="true"></div>
        </div>

        <!-- Floating tech tags -->
        <div class="hero__tag hero__tag--angular">Angular</div>
        <div class="hero__tag hero__tag--ts">Javascript</div>
        <div class="hero__tag hero__tag--tail">.NET C#</div>
      </div>

    </div>

  </div>

  <!-- Scroll cue -->
  <div class="hero__scroll-cue" aria-hidden="true">
    <span class="hero__scroll-text">scroll</span>
    <div class="hero__scroll-line"></div>
  </div>

</section>
